server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/zutils
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  jwt:
    secret: zutils-server-jwt-secret-key-change-in-production-this-is-a-long-secret-key
    expiration-ms: 86400000
  storage:
    dir: ${user.dir}/uploads/dex
    cdn-base-url: http://localhost:8080/api/v1/files
  llm:
    api-key: c11df110-89fe-45e8-a4a4-aac27e61522a
    base-url: https://ark.cn-beijing.volces.com/api/coding/v3
    model: Doubao-Seed-2.0-lite
  github:
    token: ${GITHUB_TOKEN:}
    owner: zhoulesin
    repo: ZUtils
    path: zutils-plugins
    cdn-base-url: https://raw.githubusercontent.com
